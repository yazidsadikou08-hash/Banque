
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Banque</title>
    <link href="bootstrap.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 380px;">
        <h4 class="text-center mb-3">Connexion bancaire</h4>

        <form id="loginForm">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Mot de passe</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Se connecter</button>
        </form>

        <div id="message" class="mt-3 text-center"></div>
    </div>
</div>
<a href="sold du compte.HTML">
            <button type="sub" class="btn btn-primary w-100">
             Acceder au compte 
            </button>
             </div>
            </a>
            <br>
            <a href="sold du compte.HTML" class="btn btn-outline-light me-2">Compte</a>
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("api/login.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if(data.token){
        localStorage.setItem("token", data.token);
        document.getElementById("message").innerHTML =
          "<span class='text-success'>Connexion réussie !</span>";
        setTimeout(()=>{ window.location.href = "dashboard.php"; }, 1000);
    } else {
        document.getElementById("message").innerHTML =
          "<span class='text-danger'>" + data.message + "</span>";
    }
});
</script>

</body>
</html>
